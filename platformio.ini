; PlatformIO Project Configuration
; Board:   B-WBA5M-WPAN (STM32WBA5MMG)
; Library: protronic/STM32duinoBLE @ feature/stm32wba-transport
;
; The B-WBA5M-WPAN is not yet in PlatformIO's official board registry.
; A custom board definition is provided in the boards/ directory.

[env:B_WBA5M_WPAN]
platform      = ststm32
board         = b_wba5m_wpan
framework     = arduino

; Tell PlatformIO to look for custom board definitions in the boards/ folder
board_dir = boards

; STM32duinoBLE fork with WBA transport backend
lib_deps =
    https://github.com/protronic/STM32duinoBLE.git#feature/stm32wba-transport

; WBA transport is selected automatically via STM32WBAxx macro (set in board JSON)
; No extra build_flags needed

; Upload via ST-Link
upload_protocol = stlink
debug_tool      = stlink

; Serial monitor
monitor_speed = 115200
