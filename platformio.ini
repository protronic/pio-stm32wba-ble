; PlatformIO Project Configuration
; Board:   B-WBA5M-WPAN (STM32WBA5MMG)
; Library: protronic/STM32duinoBLE @ feature/stm32wba-transport

[env:B_WBA5M_WPAN]
platform      = ststm32
board         = b_wba5m_wpan
framework     = arduino

; STM32duinoBLE fork with WBA transport backend
lib_deps =
    https://github.com/protronic/STM32duinoBLE.git#feature/stm32wba-transport

; Needed so the WBA transport is selected (not SPI)
build_flags =
    -D STM32WBAxx

; Upload via ST-Link
upload_protocol = stlink
debug_tool      = stlink

; Serial monitor
monitor_speed = 115200
